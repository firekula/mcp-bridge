<div class="mcp-container">
	<div class="tabs">
		<button id="tabMain" class="tab-button active">主页</button>
		<button id="tabConfig" class="tab-button">MCP 配置</button>
	</div>

	<div id="panelMain" class="tab-content active">
		<div class="toolbar">
			<div class="ctrl-group">
				<span>端口:</span>
				<ui-input id="portInput" style="width: 60px"></ui-input>
				<button id="btnToggle" class="green">启动</button>
				<span id="activePortDisplay" style="margin-left:8px; color:#888; font-size:12px; display:none;"></span>
			</div>
			<div class="ctrl-group" style="margin-left: 10px">
				<ui-checkbox id="autoStartCheck">自动启动</ui-checkbox>
			</div>
			<div class="spacer"></div>
			<button id="btnClear" class="transparent">清空日志</button>
			<button id="btnCopy" class="transparent">复制全部</button>
		</div>
		<div id="logConsole" class="log-view"></div>
	</div>

	<div id="panelConfig" class="tab-content" style="padding: 12px; color: #ccc; overflow-y: auto;">
		<div class="settings-container">
			<!-- 卡片 1: 自动化工具链配置 -->
			<div class="settings-card">
				<h4>⚡ 自动化工具链配置</h4>
				
				<div class="form-item">
					<label>宿主平台:</label>
					<div class="form-row">
						<select id="mcpClientSelect"></select>
						<button id="btnRefreshMcp" class="transparent">↻ 刷新</button>
					</div>
				</div>

				<div id="mcpConfigStatus" class="status-box">等待扫描...</div>

				<div class="action-group">
					<button id="btnInjectMcp" class="green">一键配置当前选择平台</button>
					<button id="btnInjectAll">尝试向所有平台分发配置</button>
				</div>
			</div>

			<!-- 卡片 2: 性能与截图优化 -->
			<div class="settings-card">
				<h4>⚙️ 性能与截图优化 <span class="subtitle">Mac 发热与卡顿优化</span></h4>
				
				<div class="form-item">
					<label>截屏最大宽度 (px):</label>
					<div class="form-row">
						<ui-input id="screenshotWidthInput" style="width: 80px"></ui-input>
						<span class="tip-text">(DPI缩放上限，推荐1024-1920)</span>
					</div>
				</div>

				<div class="form-item">
					<label>截屏防抖节流 (ms):</label>
					<div class="form-row">
						<ui-input id="screenshotThrottleInput" style="width: 80px"></ui-input>
						<span class="tip-text">(限制截图频次，推荐1000-3000)</span>
					</div>
				</div>

				<div class="action-group">
					<button id="btnSaveScreenshotSettings" class="green">保存性能配置</button>
				</div>
			</div>
		</div>
	</div>


</div>
